name: ICS Import

# Runs on a schedule so bookings stay current without anyone needing the
# dashboard open to click Sync. scripts/ics-import.js is a server-side port
# of demo/index_fixed.html's client-side syncICalFeeds()/parseICalText() —
# brought up to parity with it as of 2026-07-20 (Booking.com "Reserved"
# carve-out, blocked-event overlap-matching, the stale-block/cancellation
# sweep with its check-in guard, linked-clean cancellation). It's a
# hand-maintained copy, not a shared module (this repo has no bundler for
# the client-side app), so it CAN drift again — when changing sync or
# classification logic in one file, check the other.
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 */6 * * *'

# Prevent overlapping runs if manually triggered multiple times.
concurrency:
  group: ics-import
  cancel-in-progress: true

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run ICS Import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEBUG: "1"
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Skipped: missing Supabase secrets."; exit 0;
          fi
          echo "Starting ICS import at $(date -u)";
          node scripts/ics-import.js || { echo "ICS import failed"; exit 1; }
          echo "Completed ICS import at $(date -u)";

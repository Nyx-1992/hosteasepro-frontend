name: Supabase Deploy

# Manual-only, deliberately: migrations are reviewed and run by hand in the
# Supabase SQL Editor (see supabase/migrations/README.md) — this workflow
# exists as an optional convenience for running them via the CLI instead,
# never automatically. It used to also auto-trigger on every push to main
# touching supabase/migrations/**, which fought with that manual-review
# process; removed. It also used to deploy a standalone import_ical Edge
# Function — removed entirely, it duplicated (with none of the fixes) the
# client-side iCal sync in demo/index_fixed.html and was never actually
# scheduled to run.
on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      # Required repo/environment variable:
      # - SUPABASE_PROJECT_REF (set per branch/environment in repo settings —
      #   must never be hardcoded here, since this file is identical on every branch)
      # Required secrets:
      # - SUPABASE_ACCESS_TOKEN (account access token)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify project ref is configured
        run: |
          [ -n "$SUPABASE_PROJECT_REF" ] || { echo "SUPABASE_PROJECT_REF repo/environment variable is not set — refusing to deploy"; exit 1; }

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project (non-interactive)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          echo "Linking project ref $SUPABASE_PROJECT_REF"
          supabase link --project-ref $SUPABASE_PROJECT_REF || { echo "Project link failed"; exit 1; }

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          echo "Applying migrations"
          supabase migration up || { echo "Migration step failed"; exit 1; }

      - name: Summary
        run: echo "Migrations applied."

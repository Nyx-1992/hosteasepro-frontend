<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HostEase Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
  :root {
    --ink: #1a1a2e;
    --ink2: #16213e;
    --sand: #f5f0e8;
    --warm: #e8ddd0;
    --accent: #c17f3c;
    --accent2: #8b5e2a;
    --green: #2d6a4f;
    --green2: #52b788;
    --red: #c1121f;
    --blue: #2563eb;
    --muted: #6b7280;
    --border: #e5e0d8;
    --card: #ffffff;
    --radius: 12px;
    --shadow: 0 2px 16px rgba(26,26,46,0.08);
    --shadow-lg: 0 8px 40px rgba(26,26,46,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; }
  h1,h2,h3 { font-family: 'DM Serif Display', serif; }

/* AUTH */
.auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg, var(–ink) 0%, var(–ink2) 100%); }
.auth-card { background:var(–card); border-radius:20px; padding:48px 40px; width:100%; max-width:420px; box-shadow:var(–shadow-lg); }
.auth-logo { font-family:‘DM Serif Display’,serif; font-size:2rem; color:var(–accent); margin-bottom:8px; }
.auth-sub { color:var(–muted); font-size:.9rem; margin-bottom:32px; }
.field-group { margin-bottom:20px; }
.field-group label { display:block; font-size:.8rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(–muted); margin-bottom:6px; }
.field-group input { width:100%; padding:12px 16px; border:1.5px solid var(–border); border-radius:10px; font-size:.95rem; font-family:inherit; transition:border .2s; outline:none; background:var(–sand); }
.field-group input:focus { border-color:var(–accent); background:#fff; }
.btn { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border-radius:10px; font-family:inherit; font-size:.9rem; font-weight:500; cursor:pointer; border:none; transition:all .2s; }
.btn-primary { background:var(–accent); color:#fff; width:100%; justify-content:center; }
.btn-primary:hover { background:var(–accent2); }
.btn-ghost { background:transparent; color:var(–ink); border:1.5px solid var(–border); }
.btn-ghost:hover { background:var(–warm); }
.btn-sm { padding:7px 14px; font-size:.82rem; }
.btn-danger { background:var(–red); color:#fff; }
.btn-green { background:var(–green); color:#fff; }
.btn-green:hover { background:#1b4332; }
.btn-blue { background:var(–blue); color:#fff; }
.quick-fill { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.quick-fill button { font-size:.8rem; padding:6px 12px; border-radius:8px; border:1.5px solid var(–border); background:var(–sand); cursor:pointer; font-family:inherit; transition:all .2s; }
.quick-fill button:hover { background:var(–warm); border-color:var(–accent); }
.error-msg { background:#fef2f2; color:var(–red); border-radius:8px; padding:10px 14px; font-size:.85rem; margin-bottom:16px; }

/* LAYOUT */
.app { display:flex; min-height:100vh; }
.sidebar { width:240px; background:var(–ink); color:#fff; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; }
.sidebar-logo { padding:28px 24px 20px; border-bottom:1px solid rgba(255,255,255,.08); }
.sidebar-logo span { font-family:‘DM Serif Display’,serif; font-size:1.5rem; color:var(–accent); display:block; }
.sidebar-logo small { font-size:.75rem; color:rgba(255,255,255,.4); }
.prop-switcher { padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.08); }
.prop-switcher select { width:100%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:8px; color:#fff; padding:8px 10px; font-family:inherit; font-size:.83rem; outline:none; cursor:pointer; }
.prop-switcher select option { background:var(–ink2); }
.nav-list { flex:1; padding:12px 0; overflow-y:auto; }
.nav-item { display:flex; align-items:center; gap:10px; padding:11px 24px; font-size:.88rem; color:rgba(255,255,255,.6); cursor:pointer; transition:all .2s; border-left:3px solid transparent; }
.nav-item:hover { color:#fff; background:rgba(255,255,255,.05); }
.nav-item.active { color:#fff; background:rgba(193,127,60,.12); border-left-color:var(–accent); }
.nav-icon { font-size:1.1rem; width:20px; text-align:center; }
.sidebar-user { padding:16px; border-top:1px solid rgba(255,255,255,.08); }
.user-chip { display:flex; align-items:center; gap:10px; }
.user-avatar { width:34px; height:34px; border-radius:50%; background:var(–accent); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:.85rem; }
.user-info { flex:1; }
.user-name { font-size:.82rem; font-weight:600; }
.user-role { font-size:.72rem; color:rgba(255,255,255,.4); }
.logout-btn { background:none; border:none; color:rgba(255,255,255,.4); cursor:pointer; font-size:1rem; padding:4px; transition:color .2s; }
.logout-btn:hover { color:#fff; }

.main { margin-left:240px; flex:1; display:flex; flex-direction:column; }
.topbar { background:#fff; border-bottom:1px solid var(–border); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.page-title { font-family:‘DM Serif Display’,serif; font-size:1.5rem; color:var(–ink); }
.topbar-actions { display:flex; gap:10px; align-items:center; }
.content { padding:32px; flex:1; }

/* CARDS */
.card { background:var(–card); border-radius:var(–radius); box-shadow:var(–shadow); padding:24px; }
.card-title { font-family:‘DM Serif Display’,serif; font-size:1.1rem; margin-bottom:16px; color:var(–ink); }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:var(–card); border-radius:var(–radius); padding:20px 24px; box-shadow:var(–shadow); border-top:3px solid var(–accent); }
.stat-label { font-size:.78rem; text-transform:uppercase; letter-spacing:.06em; color:var(–muted); margin-bottom:6px; font-weight:600; }
.stat-value { font-family:‘DM Serif Display’,serif; font-size:2rem; color:var(–ink); }
.stat-sub { font-size:.78rem; color:var(–muted); margin-top:4px; }

/* CALENDAR */
.calendar-wrap { background:var(–card); border-radius:var(–radius); box-shadow:var(–shadow); overflow:hidden; }
.cal-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1px solid var(–border); }
.cal-nav { display:flex; gap:8px; }
.cal-nav button { background:var(–sand); border:1.5px solid var(–border); border-radius:8px; padding:6px 14px; cursor:pointer; font-family:inherit; transition:all .2s; }
.cal-nav button:hover { background:var(–warm); border-color:var(–accent); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
.cal-day-header { padding:10px; text-align:center; font-size:.75rem; font-weight:700; text-transform:uppercase; color:var(–muted); background:var(–sand); letter-spacing:.05em; }
.cal-cell { min-height:90px; padding:6px; border:1px solid var(–border); position:relative; background:#fff; }
.cal-cell.other-month { background:var(–sand); opacity:.6; }
.cal-cell.today { background:#fffbf5; }
.cal-cell.today .cal-date { background:var(–accent); color:#fff; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
.cal-date { font-size:.82rem; font-weight:600; margin-bottom:4px; width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
.cal-event { font-size:.7rem; padding:2px 5px; border-radius:4px; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; font-weight:500; }
.event-airbnb { background:#ff5a5f22; color:#c2373c; border-left:3px solid #ff5a5f; }
.event-booking { background:#003b9522; color:#003b95; border-left:3px solid #003b95; }
.event-lekkeslaap { background:#2d6a4f22; color:#1b4332; border-left:3px solid #2d6a4f; }
.event-fewo { background:#7c3aed22; color:#5b21b6; border-left:3px solid #7c3aed; }
.event-manual { background:#c17f3c22; color:#92400e; border-left:3px solid #c17f3c; }
.event-cleaning { background:#06b6d422; color:#0e7490; border-left:3px solid #06b6d4; }

/* TABLES */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
thead th { padding:12px 16px; text-align:left; font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(–muted); background:var(–sand); border-bottom:2px solid var(–border); }
tbody td { padding:13px 16px; border-bottom:1px solid var(–border); font-size:.88rem; }
tbody tr:hover { background:#fafafa; }
.badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
.badge-confirmed { background:#d1fae5; color:#065f46; }
.badge-pending { background:#fef3c7; color:#92400e; }
.badge-checkedin { background:#dbeafe; color:#1e40af; }
.badge-checkedout { background:#f3f4f6; color:#374151; }
.badge-airbnb { background:#ff5a5f22; color:#c2373c; }
.badge-booking { background:#003b9522; color:#003b95; }
.badge-lekkeslaap { background:#d1fae5; color:#065f46; }
.badge-manual { background:#fef3c7; color:#92400e; }

/* FORMS */
.form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; }
.form-field { display:flex; flex-direction:column; gap:6px; }
.form-field label { font-size:.78rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(–muted); }
.form-field input, .form-field select, .form-field textarea { padding:10px 14px; border:1.5px solid var(–border); border-radius:8px; font-family:inherit; font-size:.9rem; outline:none; transition:border .2s; background:var(–sand); }
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color:var(–accent); background:#fff; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(26,26,46,.5); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
.modal { background:var(–card); border-radius:16px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; box-shadow:var(–shadow-lg); }
.modal-header { padding:24px 28px 0; display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.modal-title { font-family:‘DM Serif Display’,serif; font-size:1.3rem; }
.modal-close { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(–muted); padding:4px; }
.modal-body { padding:0 28px 28px; }

/* TASKS */
.task-item { display:flex; align-items:flex-start; gap:12px; padding:14px 0; border-bottom:1px solid var(–border); }
.task-check { width:20px; height:20px; border-radius:6px; border:2px solid var(–border); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; transition:all .2s; }
.task-check.done { background:var(–green); border-color:var(–green); color:#fff; }
.task-content { flex:1; }
.task-title { font-size:.9rem; font-weight:500; }
.task-title.done { text-decoration:line-through; color:var(–muted); }
.task-meta { font-size:.75rem; color:var(–muted); margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; }
.priority-high { color:var(–red); font-weight:600; }
.priority-medium { color:var(–accent); font-weight:600; }
.priority-low { color:var(–green); font-weight:600; }

/* DOMESTIC */
.domestic-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.domestic-card { background:var(–card); border-radius:var(–radius); padding:20px; box-shadow:var(–shadow); border-top:3px solid var(–green2); }
.domestic-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.domestic-name { font-weight:600; font-size:.95rem; }
.domestic-date { font-size:.78rem; color:var(–muted); }
.domestic-details { font-size:.83rem; color:var(–muted); line-height:1.6; }
.checklist-item { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:.85rem; }
.checklist-item input[type=checkbox] { width:16px; height:16px; accent-color:var(–green); cursor:pointer; }

/* KNOWLEDGE */
.kb-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.kb-card { background:var(–card); border-radius:var(–radius); padding:20px; box-shadow:var(–shadow); cursor:pointer; transition:all .2s; border:1.5px solid transparent; }
.kb-card:hover { border-color:var(–accent); transform:translateY(-2px); box-shadow:var(–shadow-lg); }
.kb-category { font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; font-weight:700; color:var(–accent); margin-bottom:6px; }
.kb-title { font-weight:600; margin-bottom:8px; }
.kb-preview { font-size:.82rem; color:var(–muted); line-height:1.5; }

/* REPORTS */
.report-section { margin-bottom:32px; }
.chart-placeholder { background:var(–sand); border-radius:var(–radius); padding:20px; min-height:200px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:var(–muted); }
.bar-chart { display:flex; align-items:flex-end; gap:8px; height:140px; padding:0 8px; }
.bar-col { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
.bar { width:100%; border-radius:4px 4px 0 0; background:var(–accent); opacity:.8; min-height:4px; transition:height .5s; }
.bar-label { font-size:.68rem; color:var(–muted); text-align:center; }
.bar-val { font-size:.68rem; font-weight:700; color:var(–ink); }

/* TOAST */
.toast-wrap { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; }
.toast { background:var(–ink); color:#fff; padding:12px 20px; border-radius:10px; font-size:.85rem; box-shadow:var(–shadow-lg); animation:slideIn .3s ease; max-width:320px; }
.toast.success { background:var(–green); }
.toast.error { background:var(–red); }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* MISC */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.tag { display:inline-block; padding:2px 8px; border-radius:6px; font-size:.72rem; font-weight:600; background:var(–warm); color:var(–ink); }
.empty-state { text-align:center; padding:48px 20px; color:var(–muted); }
.empty-icon { font-size:3rem; margin-bottom:12px; }
.flex { display:flex; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.mb-4 { margin-bottom:16px; }
.mb-6 { margin-bottom:24px; }
.text-muted { color:var(–muted); font-size:.85rem; }
.text-sm { font-size:.82rem; }
.font-bold { font-weight:700; }
.divider { height:1px; background:var(–border); margin:16px 0; }
.loading { display:flex; align-items:center; justify-content:center; padding:40px; gap:10px; color:var(–muted); }
.spinner { width:20px; height:20px; border:2px solid var(–border); border-top-color:var(–accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* SETUP BANNER */
.setup-banner { background:linear-gradient(135deg,#1a1a2e,#16213e); color:#fff; border-radius:var(–radius); padding:24px 28px; margin-bottom:24px; }
.setup-banner h3 { font-family:‘DM Serif Display’,serif; color:var(–accent); margin-bottom:8px; }
.setup-banner p { font-size:.85rem; line-height:1.6; opacity:.8; }
.setup-banner code { background:rgba(255,255,255,.1); padding:2px 8px; border-radius:4px; font-size:.8rem; }

/* RESPONSIVE */
@media(max-width:768px) {
.sidebar { display:none; }
.main { margin-left:0; }
.content { padding:16px; }
.stat-grid { grid-template-columns:1fr 1fr; }
.form-grid { grid-template-columns:1fr; }
.grid-2 { grid-template-columns:1fr; }
}
</style>

</head>

// Normalise real tasks DB row → app shape
// Real DB: title, description, due_at, task_date, assigned_user_id, type
// App uses: title, notes, due, assigned, property_id (text)
function normaliseTask(t) {
  return {
    ...t,
    notes:    t.notes || t.description || '',
    due:      (t.due || t.due_at || t.task_date || '').toString().slice(0,10),
    assigned: t.assigned || t.assigned_user_id || 'Unassigned',
    property_id: t.property_id || 'all',
    priority: t.priority || 'medium',
    status:   t.status || 'open',
  };
}

// Normalise real domestics DB row → app shape
function normaliseDomestic(d) {
  return {
    ...d,
    checklist: d.checklist || {kitchen:false,bathrooms:false,bedrooms:false,living:false,laundry:false},
    property_id: d.property_id || 'speranta',
  };
}

let toastFn = null;
function Toast() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    toastFn = (msg, type='info') => {
      const id = Date.now();
      setToasts(t => [...t, {id,msg,type}]);
      setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
    };
  }, []);
  return (
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
    </div>
  );
}
const toast = (msg, type) => toastFn && toastFn(msg, type);

// ── CALENDAR ─────────────────────────────────────────────────────
function CalendarView({ bookings, domestics, property }) {
  const [current, setCurrent] = useState(new Date(2026,3,1));
  const [selected, setSelected] = useState(null);

  const year = current.getFullYear(), month = current.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date().toISOString().slice(0,10);

  const filteredBookings = property === 'all' ? bookings : bookings.filter(b => b.property_id === property);
  const filteredDomestics = property === 'all' ? domestics : domestics.filter(d => d.property_id === property);

  const getEventsForDay = (day) => {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const events = [];
    filteredBookings.forEach(b => {
      if (b.check_in <= dateStr && b.check_out > dateStr) {
        events.push({...b, type:'booking', label: b.check_in === dateStr ? `🛬 ${b.guest_name}` : b.check_out === new Date(new Date(dateStr).getTime()+86400000).toISOString().slice(0,10) ? `🛫 ${b.guest_name}` : b.guest_name.split(' ')[0]});
      }
    });
    filteredDomestics.forEach(d => {
      if (d.date === dateStr) events.push({...d, type:'cleaning', label:`🧹 ${d.cleaner.split(' ')[0]}`});
    });
    return events;
  };

  const cells = [];
  for (let i=0; i<firstDay; i++) cells.push({day:null});
  for (let d=1; d<=daysInMonth; d++) cells.push({day:d});
  while (cells.length % 7 !== 0) cells.push({day:null});

  const monthName = current.toLocaleDateString('en-ZA',{month:'long',year:'numeric'});

  return (
    <div>
      <div className="calendar-wrap mb-6">
        <div className="cal-header">
          <h2 style={{fontFamily:'DM Serif Display,serif',fontSize:'1.3rem'}}>{monthName}</h2>
          <div className="cal-nav">
            <button onClick={()=>setCurrent(new Date(year,month-1,1))}>← Prev</button>
            <button onClick={()=>setCurrent(new Date())}>Today</button>
            <button onClick={()=>setCurrent(new Date(year,month+1,1))}>Next →</button>
          </div>
        </div>
        <div className="cal-grid">
          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} className="cal-day-header">{d}</div>)}
          {cells.map((cell,i) => {
            const events = cell.day ? getEventsForDay(cell.day) : [];
            const dateStr = cell.day ? `${year}-${String(month+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}` : '';
            return (
              <div key={i} className={`cal-cell ${!cell.day?'other-month':''} ${dateStr===today?'today':''}`} onClick={()=>cell.day&&setSelected({day:cell.day,events})}>
                {cell.day && <div className="cal-date">{cell.day}</div>}
                {events.slice(0,3).map((ev,j) => (
                  <div key={j} className={`cal-event event-${ev.type==='cleaning'?'cleaning':ev.platform}`}>{ev.label}</div>
                ))}
                {events.length>3 && <div style={{fontSize:'.65rem',color:'var(--muted)',paddingLeft:'4px'}}>+{events.length-3} more</div>}
              </div>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div className="card-title">Legend</div>
        <div style={{display:'flex',gap:'16px',flexWrap:'wrap'}}>
          {[['airbnb','Airbnb','#ff5a5f'],['booking','Booking.com','#003b95'],['lekkeslaap','LekkeSlaap','#2d6a4f'],['fewo','Fewo','#7c3aed'],['manual','Manual','#c17f3c'],['cleaning','Cleaning','#06b6d4']].map(([k,n,c])=>(
            <div key={k} style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'.8rem'}}>
              <div style={{width:12,height:12,borderRadius:2,background:c,opacity:.7}}/>
              <span>{n}</span>
            </div>
          ))}
        </div>
      </div>

      {selected && (
        <div className="modal-overlay" onClick={()=>setSelected(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">April {selected.day}, 2026</div>
              <button className="modal-close" onClick={()=>setSelected(null)}>×</button>
            </div>
            <div className="modal-body">
              {selected.events.length===0 ? <div className="text-muted">No events on this day</div> : selected.events.map((ev,i)=>(
                <div key={i} style={{padding:'12px',background:'var(--sand)',borderRadius:'8px',marginBottom:'8px'}}>
                  <div style={{fontWeight:600,marginBottom:'4px'}}>{ev.type==='cleaning'?'🧹 Cleaning':ev.type==='booking'?'📋 Booking':''}</div>
                  {ev.type==='booking' && <>
                    <div style={{fontSize:'.88rem'}}>Guest: {ev.guest_name}</div>
                    <div style={{fontSize:'.88rem'}}>Check-in: {ev.check_in} · Check-out: {ev.check_out}</div>
                    <div style={{fontSize:'.88rem'}}>Property: {PROPERTIES.find(p=>p.id===ev.property_id)?.name}</div>
                    <span className={`badge badge-${ev.platform}`} style={{marginTop:'6px'}}>{ev.platform}</span>
                  </>}
                  {ev.type==='cleaning' && <>
                    <div style={{fontSize:'.88rem'}}>Cleaner: {ev.cleaner}</div>
                    <div style={{fontSize:'.88rem'}}>Time: {ev.time} · Type: {ev.type}</div>
                    <div style={{fontSize:'.88rem'}}>Property: {PROPERTIES.find(p=>p.id===ev.property_id)?.name}</div>
                    <span className={`badge ${ev.status==='completed'?'badge-confirmed':'badge-pending'}`} style={{marginTop:'6px'}}>{ev.status}</span>
                  </>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TasksView({ tasks, setTasks, property, user }) {
  const [showModal, setShowModal] = useState(false);
  const [filter, setFilter] = useState('open');
  const [form, setForm] = useState({ title:'', property_id:property!=='all'?property:'all', priority:'medium', assigned:user.name, due:'', notes:'' });

  const filtered = (property==='all'?tasks:tasks.filter(t=>t.property_id===property||t.property_id==='all'))
    .filter(t => filter==='all' || t.status===filter)
    .sort((a,b) => { const p = {high:0,medium:1,low:2}; return p[a.priority]-p[b.priority]; });

  const toggle = async (id) => {
    const task = tasks.find(t => t.id === id);
    const newStatus = task?.status === 'done' ? 'open' : 'done';
    if (supabaseClient) {
      await supabaseClient.from('tasks').update({status: newStatus}).eq('id', id);
    }
    setTasks(prev => prev.map(t => t.id===id ? {...t, status:newStatus} : t));
  };

  const addTask = async () => {
    if (!form.title) { toast('Task title is required','error'); return; }
    // Map app fields → real DB column names
    const dbRow = {
      title:       form.title,
      description: form.notes || '',
      priority:    form.priority,
      status:      'open',
      type:        'task',
      due_at:      form.due || null,
      task_date:   form.due || null,
      property_id: form.property_id !== 'all' ? form.property_id : null,
    };
    if (supabaseClient) {
      const { data, error } = await supabaseClient.from('tasks').insert([dbRow]).select().single();
      if (error) { toast('Save error: ' + error.message, 'error'); return; }
      setTasks(prev => [normaliseTask({...data, property_id: form.property_id, assigned: form.assigned}), ...prev]);
    } else {
      setTasks(prev => [normaliseTask({...dbRow, id:'t'+Date.now(), property_id: form.property_id, assigned: form.assigned}), ...prev]);

    toast('Task created','success');
    setShowModal(false);
    setForm({ title:'', property_id:'all', priority:'medium', assigned:user.name, due:'', notes:'' });

  const openCount = tasks.filter(t=>t.status==='open').length;

          <h2 style={{fontFamily:'DM Serif Display,serif',fontSize:'1.3rem',marginBottom:'4px'}}>Tasks</h2>

          {['open','done','all'].map(f=>(
            <button key={f} className={`btn btn-sm ${filter===f?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(f)}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>
          ))}

        {filtered.map(t=>(

              <div className="task-meta">

function ReportsView({ bookings, property }) {
  const filtered = property==='all' ? bookings : bookings.filter(b=>b.property_id===property);

  const platformBreakdown = ['airbnb','booking','lekkeslaap','fewo','manual'].map(p => ({
    platform:p, count:filtered.filter(b=>b.platform===p).length,
    revenue:filtered.filter(b=>b.platform===p).reduce((s,b)=>s+b.revenue,0)
  })).filter(p=>p.count>0);

  const monthlyRevenue = [
    {month:'Jan',rev:12400},{month:'Feb',rev:18200},{month:'Mar',rev:21500},{month:'Apr',rev:14700},{month:'May',rev:8600},
    {month:'Jun',rev:5200},{month:'Jul',rev:9800},{month:'Aug',rev:11300},{month:'Sep',rev:19600},{month:'Oct',rev:22100},{month:'Nov',rev:16800},{month:'Dec',rev:24300}
  ];
  const maxRev = Math.max(...monthlyRevenue.map(m=>m.rev));

  const totalRevenue = filtered.reduce((s,b)=>s+b.revenue,0);
  const totalNights = filtered.reduce((s,b)=>s+b.nights,0);
  const avgNightly = totalNights ? Math.round(totalRevenue/totalNights) : 0;
  const occupancyRate = Math.round((totalNights / (property==='all'?60:30)) * 100);

  const seasonalInsight = () => {
    const month = new Date().getMonth();
    if ([5,6,7].includes(month)) return '❄️ Low season (Cape Town winter). Consider discounts 15-20% to maintain occupancy. Target German and Dutch markets.';
    if ([11,0,1,2].includes(month)) return '🌞 Peak summer season! Rates can be 30-40% higher. Minimum stay 3 nights recommended.';
    return '🍂 Shoulder season. Good occupancy expected. Competitive pricing will outperform.';
  };

  return (
    <div>
      <div className="stat-grid" style={{marginBottom:'24px'}}>
        <div className="stat-card"><div className="stat-label">Total Revenue</div><div className="stat-value">R{totalRevenue.toLocaleString()}</div><div className="stat-sub">All bookings</div></div>
        <div className="stat-card" style={{borderTopColor:'var(--blue)'}}><div className="stat-label">Total Bookings</div><div className="stat-value">{filtered.length}</div><div className="stat-sub">Across all platforms</div></div>
        <div className="stat-card" style={{borderTopColor:'var(--green2)'}}><div className="stat-label">Avg Nightly Rate</div><div className="stat-value">R{avgNightly.toLocaleString()}</div><div className="stat-sub">Per night average</div></div>
        <div className="stat-card" style={{borderTopColor:'#7c3aed'}}><div className="stat-label">Occupancy Rate</div><div className="stat-value">{occupancyRate}%</div><div className="stat-sub">This period</div></div>
      </div>

      <div className="card mb-6">
        <div className="card-title">💡 Smart Pricing Insight</div>
        <div style={{background:'var(--sand)',borderRadius:'10px',padding:'16px',fontSize:'.9rem',lineHeight:'1.6'}}>{seasonalInsight()}</div>
        <div className="divider"/>

// ── MESSAGES TAB ─────────────────────────────────────────────────
function MessagesView({ user }) {
  const [msgs, setMsgs] = useState([
    { id:'m1', from:'Nicole', role:'admin', text:'Speranta: the Jan Müller booking confirmed for 18 Apr. Make sure the welcome pack is ready.', time:'09:14', date:'Today' },
    { id:'m2', from:'Nina Williams', role:'host', text:'Got it! Will prepare the apartment by 16:00. Precious confirmed for cleaning at 10:00.', time:'09:32', date:'Today' },
    { id:'m3', from:'Silja', role:'admin', text:'Remember we need to update the TV House description on Airbnb — new bedding is in.', time:'10:05', date:'Today' },
    { id:'m4', from:'Nicole', role:'admin', text:'Nina, the tap in Speranta bathroom — please check if Botha can come this week.', time:'11:20', date:'Today' },
  ]);
  const [newMsg, setNewMsg] = useState('');

  const send = () => {
    if (!newMsg.trim()) return;
    setMsgs(prev=>[...prev,{id:'m'+Date.now(),from:user.name,role:user.role,text:newMsg,time:new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'}),date:'Today'}]);
    setNewMsg('');
  };

  return (
    <div>
      <div className="card" style={{marginBottom:'20px'}}>
        <div style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:'16px'}}>Team channel — replacing WhatsApp. All messages are logged and searchable.</div>
        <div style={{maxHeight:'400px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'10px',marginBottom:'16px'}}>
          {msgs.map(m=>(
            <div key={m.id} style={{display:'flex',alignItems:'flex-start',gap:'10px',flexDirection:m.from===user.name?'row-reverse':'row'}}>
              <div style={{width:34,height:34,borderRadius:'50%',background:m.role==='admin'?'var(--accent)':'var(--green2)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:'.8rem',flexShrink:0}}>
                {m.from.split(' ').map(n=>n[0]).join('').slice(0,2)}
              </div>
              <div style={{maxWidth:'70%'}}>
                <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:'3px',textAlign:m.from===user.name?'right':'left'}}>{m.from} · {m.time}</div>
                <div style={{background:m.from===user.name?'var(--accent)':'var(--sand)',color:m.from===user.name?'#fff':'var(--ink)',padding:'10px 14px',borderRadius:m.from===user.name?'16px 16px 4px 16px':'16px 16px 16px 4px',fontSize:'.88rem',lineHeight:'1.5'}}>
                  {m.text}
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:'10px'}}>
          <input style={{flex:1,padding:'11px 16px',border:'1.5px solid var(--border)',borderRadius:'10px',fontFamily:'inherit',fontSize:'.9rem',outline:'none'}}
            placeholder="Message the team…" value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
          <button className="btn btn-primary" onClick={send}>Send</button>
        </div>
      </div>
    </div>
  );
}

function SetupView() {
  const sql = `-- Run this SQL in your Supabase SQL Editor to create the schema:

CREATE TABLE IF NOT EXISTS bookings (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,

  check_in DATE NOT NULL,
  check_out DATE NOT NULL,
  nights INTEGER,
  status TEXT DEFAULT 'confirmed',
  revenue NUMERIC DEFAULT 0,
  currency TEXT DEFAULT 'ZAR',
  notes TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS tasks (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  title TEXT NOT NULL,
  property_id TEXT,
  priority TEXT DEFAULT 'medium',
  status TEXT DEFAULT 'open',
  assigned TEXT,
  due DATE,
  notes TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS domestics (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  cleaner TEXT NOT NULL,
  property_id TEXT NOT NULL,
  date DATE NOT NULL,
  time TEXT,
  type TEXT DEFAULT 'turnover',
  status TEXT DEFAULT 'scheduled',
  notes TEXT,
  checklist JSONB DEFAULT '{}',
  booking_ref TEXT,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS kb_articles (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  category TEXT NOT NULL,
  title TEXT NOT NULL,
  content TEXT NOT NULL,
  tags TEXT[] DEFAULT '{}',
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- Enable Row Level Security (optional but recommended)
ALTER TABLE bookings ENABLE ROW LEVEL SECURITY;
ALTER TABLE tasks ENABLE ROW LEVEL SECURITY;

-- Allow all operations for now (tighten later with auth policies)

// ── MAIN APP ─────────────────────────────────────────────────────
function App() {
const [user, setUser] = useState(null);
const [tab, setTab] = useState(‘dashboard’);
const [property, setProperty] = useState(‘all’);
const [bookings, setBookings] = useState(SAMPLE_BOOKINGS);
const [tasks, setTasks] = useState(SAMPLE_TASKS);
const [domestics, setDomestics] = useState(SAMPLE_DOMESTICS);
const [dbConnected, setDbConnected] = useState(false);

// Load live data from Supabase on login
useEffect(() => {
if (!user || !supabaseClient) return;
const load = async () => {
try {
const [bRes, tRes, dRes] = await Promise.all([
supabaseClient.from(‘bookings’).select(’*’).order(‘check_in’, { ascending: false }),
supabaseClient.from(‘tasks’).select(’*’).order(‘created_at’, { ascending: false }),
supabaseClient.from(‘domestics’).select(’*’).order(‘date’, { ascending: true }),
]);
setDbConnected(true);
if (bRes.data && bRes.data.length > 0) { setBookings(bRes.data.map(normaliseBooking)); toast(‘Live bookings loaded from database ✓’, ‘success’); }
else { toast(‘DB connected — no bookings yet. Sample data shown.’, ‘info’); }
if (tRes.data && tRes.data.length > 0) setTasks(tRes.data.map(normaliseTask));
if (dRes.data && dRes.data.length > 0) setDomestics(dRes.data.map(normaliseDomestic));
} catch (e) { console.warn(‘Supabase load:’, e); }
};
load();
}, [user]);

const isAdmin = user?.role === ‘admin’;

const navItems = [
{ id:‘dashboard’, label:‘Dashboard’, icon:‘🏠’, roles:[‘admin’,‘host’] },
{ id:‘bookings’, label:‘Bookings’, icon:‘📋’, roles:[‘admin’,‘host’] },
{ id:‘calendar’, label:‘Calendar’, icon:‘📅’, roles:[‘admin’,‘host’] },

{ id:‘tasks’, label:‘Tasks’, icon:‘✅’, roles:[‘admin’,‘host’] },
{ id:‘messages’, label:‘Messages’, icon:‘💬’, roles:[‘admin’,‘host’] },
{ id:‘knowledge’, label:‘Knowledge Base’, icon:‘📚’, roles:[‘admin’,‘host’] },
{ id:‘reports’, label:‘Reports’, icon:‘📊’, roles:[‘admin’] },
{ id:‘setup’, label:‘DB Setup Guide’, icon:‘⚙️’, roles:[‘admin’] },
].filter(n => n.roles.includes(user?.role));

if (!user) return <><AuthScreen onLogin={setUser}/><Toast/></>;

return (
<div className="app">
<aside className="sidebar">
<div className="sidebar-logo">
<span>HostEase Pro</span>
<small>Property Management</small>
</div>
<div className="prop-switcher">
<select value={property} onChange={e=>setProperty(e.target.value)}>
{PROPERTIES.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
</select>
</div>
<nav className="nav-list">
{navItems.map(n=>(
<div key={n.id} className={`nav-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
<span className="nav-icon">{n.icon}</span>
{n.label}
</div>
))}
</nav>
<div className="sidebar-user">
<div className="user-chip">
<div className="user-avatar">{user.initials}</div>
<div className="user-info">
<div className="user-name">{user.name}</div>
<div className="user-role">{user.role}</div>
</div>
<button className=“logout-btn” onClick={()=>setUser(null)} title=“Sign out”>⏏</button>
</div>
</div>
</aside>

```

      <div className="topbar-actions">
        {property !== 'all' && <span className="tag">📍 {PROPERTIES.find(p=>p.id===property)?.name}</span>}
